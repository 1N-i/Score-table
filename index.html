<html>
  <head>
    <title>Score table</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <h1>Score table</h1>
    <table style="width:100%">
      <thead>
        <tr>
          <th>Name</th>
          <th>Victories</th>
          <th>Draws</th>
          <th>Defeats</th>
          <th>Points</th>
          <th colspan="3">Actions: </th>
        </tr>
      </thead>

      <tbody id="tablePlayers">
        <tr>
          <td><button onClick="addVictory()">Victory</button></td>
          <td><button onClick="addDraw()">Draw</button></td>
          <td><button onClick="addDefeat()">Defeat</button></td>
        </tr>
      </tbody>
    </table>

    <p>.</p>
    <input type="number" id="numberPlayers" name="numberPlayers" min="1" step="1" placeholder="Insert number of players" required>
    <p></p>
    <button onClick="setPlayerNumber()">Show players</button>

    <script src="script.js"></script>
  </body>
</html>
